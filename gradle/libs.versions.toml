work-runtime = { module = "androidx.work:work-runtime", version.ref = "workRunTime" }
expresson4j = { module = "net.objecthunter:exp4j", version.ref = "exp4j" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
