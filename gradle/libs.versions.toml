sqlite = { module = "androidx.sqlite:sqlite", version.ref = "sqlite" }
lottie = { module = "com.airbnb.android:lottie", version.ref = "lottie" }
androidsvg = { module = "com.caverock:androidsvg", version.ref = "androidsvg" }
